<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Goa Luxury Realty · AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0a0806;display:flex;align-items:center;justify-content:center;padding:16px;font-family:system-ui,-apple-system,sans-serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2010;border-radius:2px}
.chat-wrap{width:100%;max-width:480px;display:flex;flex-direction:column;height:min(700px,95vh);background:#0f0d09;border:1px solid #2a2010;border-radius:20px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.8),0 0 0 1px #c9a84c22}
.header{background:linear-gradient(135deg,#1a1308 0%,#0f0d09 100%);border-bottom:1px solid #2a2010;padding:18px 20px}
.header-top{display:flex;align-items:center;gap:12px}
.avatar{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#c9a84c,#8a6a20);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px #c9a84c44;flex-shrink:0}
.header-name{color:#f0d080;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;letter-spacing:.02em}
.header-sub{display:flex;align-items:center;gap:6px;margin-top:2px}
.online-dot{width:6px;height:6px;border-radius:50%;background:#00cc66;box-shadow:0 0 6px #00cc66;flex-shrink:0}
.header-sub span{color:#6a5a30;font-size:11px;font-family:'JetBrains Mono',monospace}
.stats{display:flex;gap:16px;margin-top:14px}
.stat{flex:1;background:#1a1308;border-radius:8px;padding:8px 10px;text-align:center;border:1px solid #2a2010}
.stat-val{color:#c9a84c;font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-label{color:#4a3a18;font-size:9px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em}
.messages{flex:1;overflow-y:auto;padding:20px 16px 8px}
.msg-row{display:flex;margin-bottom:14px;animation:fadeUp .3s ease}
.msg-row.user{justify-content:flex-end}
.msg-row.bot{justify-content:flex-start}
.bot-icon{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#c9a84c,#8a6a20);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-right:10px;margin-top:2px;box-shadow:0 2px 8px #c9a84c44;color:#000;font-weight:700;font-family:'JetBrains Mono',monospace}
.bubble{max-width:75%;border-radius:4px 16px 16px 16px;padding:12px 16px;font-size:13.5px;line-height:1.65}
.bubble.bot{background:#1a1510;color:#e8dcc8;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.bubble.user{background:linear-gradient(135deg,#c9a84c,#a07830);color:#000;border-radius:16px 4px 16px 16px;box-shadow:0 2px 12px rgba(201,168,76,.3)}
.typing{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.typing-dots{background:#1a1510;border-radius:4px 16px 16px 16px;padding:14px 16px;display:flex;gap:4px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:#c9a84c;opacity:.7}
.dot:nth-child(1){animation:bounce 1.2s ease-in-out 0s infinite}
.dot:nth-child(2){animation:bounce 1.2s ease-in-out .2s infinite}
.dot:nth-child(3){animation:bounce 1.2s ease-in-out .4s infinite}
.quick-replies{padding:0 16px 12px;display:flex;gap:6px;flex-wrap:wrap}
.qr-btn{background:#1a1510;border:1px solid #2a2010;color:#c9a84c;border-radius:20px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;white-space:nowrap;transition:border-color .2s}
.qr-btn:hover{border-color:#c9a84c}
.input-area{padding:12px 16px 16px;border-top:1px solid #1a1510;background:#0c0a06}
.input-box{display:flex;gap:8px;align-items:flex-end;background:#1a1510;border:1px solid #2a2010;border-radius:14px;padding:8px 8px 8px 14px}
.input-box textarea{flex:1;background:none;border:none;color:#e8dcc8;font-size:13px;resize:none;font-family:system-ui;line-height:1.5;max-height:80px;outline:none}
.send-btn{width:36px;height:36px;border-radius:10px;border:1px solid #2a2010;background:#1a1510;color:#333;cursor:not-allowed;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.send-btn.active{background:linear-gradient(135deg,#c9a84c,#a07830);border-color:#c9a84c;color:#000;cursor:pointer}
.footer-text{color:#2a2010;font-size:10px;font-family:'JetBrains Mono',monospace;text-align:center;margin:8px 0 0}
.lead-badge{background:#1a2a1a;border:1px solid #2a4a2a;border-radius:8px;padding:4px 10px;margin-left:auto;display:none}
.lead-badge span{color:#55aa55;font-size:9px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.1em}
strong{font-weight:700}
</style>
</head>
<body>
<div class="chat-wrap">
  <div class="header">
    <div class="header-top">
      <div class="avatar">🏡</div>
      <div style="flex:1">
        <div class="header-name">Goa Luxury Realty</div>
        <div class="header-sub">
          <div class="online-dot"></div>
          <span>Priya · Built by Harshada Solutions · Powered by Claude</span>
        </div>
      </div>
      <div class="lead-badge" id="lead-badge"><span>Lead captured ✓</span></div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-val">200+</div><div class="stat-label">Properties</div></div>
      <div class="stat"><div class="stat-val">15+</div><div class="stat-label">Years in Goa</div></div>
      <div class="stat"><div class="stat-val">2hr</div><div class="stat-label">Response</div></div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="quick-replies" id="quick-replies">
    <button class="qr-btn" onclick="sendQuick(this)">🏖️ Show beachfront villas</button>
    <button class="qr-btn" onclick="sendQuick(this)">🏢 Commercial spaces</button>
    <button class="qr-btn" onclick="sendQuick(this)">📅 Book a site visit</button>
    <button class="qr-btn" onclick="sendQuick(this)">💰 What's my budget?</button>
    <button class="qr-btn" onclick="sendQuick(this)">🌍 I'm an NRI buyer</button>
    <button class="qr-btn" onclick="sendQuick(this)">📞 Talk to an agent</button>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="input" rows="1" placeholder="Ask about properties, pricing, site visits..." oninput="onInput()" onkeydown="onKey(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
    </div>
    <p class="footer-text">Built by Harshada Solutions · Powered by Claude · Goa Luxury Realty</p>
  </div>
</div>

<script>
const SYSTEM = `You are Priya, a warm and professional AI assistant for "Goa Luxury Realty" — a premium real estate agency in Goa, India. You speak in a friendly, helpful tone. You know everything about the agency's listings and services.

PROPERTIES AVAILABLE:
- Beachfront Villas: ₹2Cr–₹15Cr (North Goa: Anjuna, Calangute, Vagator | South Goa: Palolem, Agonda)
- Apartments: ₹45L–₹2.5Cr (Panaji, Mapusa, Margao, Porvorim)
- Commercial Spaces: ₹80L–₹8Cr (Panaji, Vasco, Margao)
- Land Plots: ₹20L–₹5Cr (various locations)
- Luxury Penthouses: ₹3Cr–₹12Cr (Dona Paula, Candolim)

SERVICES:
- Property buying & selling guidance
- Site visit scheduling (Mon–Sat, 9am–6pm)
- NRI/OCI buyer assistance
- Rental & property management
- Home loan guidance (SBI, HDFC, ICICI partner banks)
- Legal documentation support

KEY FACTS:
- Stamp duty: 3.5% (women buyers), 5% (men buyers)
- Foreign nationals & NRIs welcome with special guidance
- Response time: within 2 hours on business days
- Free property valuation available

LEAD CAPTURE: When someone wants to book a site visit or enquire seriously, collect their: full name, phone number, preferred date/time, and property type interest. Confirm you'll have an agent contact them within 2 hours.

COMPLAINTS: Apologize sincerely, empathize, and promise to escalate to a senior advisor within 1 hour. Ask for their contact details.

TONE: Warm, trustworthy, knowledgeable. Occasionally use "🌴" or "✨" to keep it friendly. Never make up specific property addresses. Keep responses concise — 2-4 sentences max unless listing options.`;

const GREETING = `Namaste! 🌴 I'm Priya, your personal property advisor at **Goa Luxury Realty**.\n\nWhether you're looking for a beachfront villa, a smart investment, or your forever home in Goa — I'm here to help. What brings you here today?`;

let history = [];
let loading = false;
let msgCount = 0;

function formatText(t) {
  return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
}

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  if (role === 'bot') {
    row.innerHTML = `<div class="bot-icon">P</div><div class="bubble bot">${formatText(text)}</div>`;
  } else {
    row.innerHTML = `<div class="bubble user">${formatText(text)}</div>`;
  }
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  msgCount++;
  if (msgCount > 2) document.getElementById('quick-replies').style.display = 'none';
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'typing'; el.id = 'typing';
  el.innerHTML = `<div class="bot-icon">P</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() { const el = document.getElementById('typing'); if(el) el.remove(); }

function onInput() {
  const val = document.getElementById('input').value.trim();
  document.getElementById('send-btn').className = val && !loading ? 'send-btn active' : 'send-btn';
}

function onKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }

function sendQuick(btn) { sendMessage(btn.textContent.trim()); }

async function sendMessage(text) {
  const input = document.getElementById('input');
  const userText = text || input.value.trim();
  if (!userText || loading) return;
  input.value = ''; onInput();

  if (/site visit|book|appointment|call me|contact/i.test(userText)) {
    document.getElementById('lead-badge').style.display = 'block';
  }

  addMessage('user', userText);
  history.push({ role: 'user', content: userText });
  loading = true; showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYSTEM, messages: history })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || "I'm sorry, I couldn't process that. Please try again.";
    history.push({ role: 'assistant', content: reply });
    hideTyping(); addMessage('bot', reply);
  } catch(e) {
    hideTyping(); addMessage('bot', "Sorry, I'm having trouble connecting. Please try again in a moment. 🙏");
  }
  loading = false; onInput();
}

addMessage('bot', GREETING);
history.push({ role: 'assistant', content: GREETING });
</script>
</body>
</html>
