<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Coconut Grove · AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0e0804;display:flex;align-items:center;justify-content:center;padding:16px;font-family:system-ui,-apple-system,sans-serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
@keyframes sway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a1808;border-radius:2px}
.chat-wrap{width:100%;max-width:480px;display:flex;flex-direction:column;height:min(700px,95vh);background:#120a04;border:1px solid #2a1808;border-radius:20px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.8),0 0 0 1px #e86a2a22}
.header{background:linear-gradient(160deg,#1e0e04 0%,#120a04 100%);border-bottom:1px solid #2a1808;padding:16px 18px}
.header-top{display:flex;align-items:center;gap:12px}
.avatar{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#e86a2a,#a03010);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px #e86a2a55;animation:sway 3s ease-in-out infinite;flex-shrink:0}
.header-name{color:#f5c090;font-family:Fraunces,serif;font-size:19px;font-weight:700;letter-spacing:.01em}
.header-sub{display:flex;align-items:center;gap:6px;margin-top:2px}
.online-dot{width:6px;height:6px;border-radius:50%;background:#00cc66;box-shadow:0 0 6px #00cc66;flex-shrink:0}
.header-sub span{color:#6a3a18;font-size:11px;font-family:'JetBrains Mono',monospace}
.info-strip{display:flex;gap:8px;margin-top:14px}
.info-chip{flex:1;background:#1a0e06;border:1px solid #2a1808;border-radius:8px;padding:7px 8px;display:flex;align-items:center;gap:5px;justify-content:center}
.info-chip span:first-child{font-size:11px}
.info-chip span:last-child{color:#6a3a18;font-size:9px;font-family:'JetBrains Mono',monospace}
.messages{flex:1;overflow-y:auto;padding:18px 15px 8px}
.msg-row{display:flex;margin-bottom:14px;animation:fadeUp .3s ease}
.msg-row.user{justify-content:flex-end}
.msg-row.bot{justify-content:flex-start}
.bot-icon{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#e86a2a,#c04010);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-right:10px;margin-top:2px;box-shadow:0 2px 8px #e86a2a55}
.bubble{max-width:76%;border-radius:4px 16px 16px 16px;padding:11px 15px;font-size:13.5px;line-height:1.65}
.bubble.bot{background:#1c1208;color:#f0e0d0;box-shadow:0 2px 10px rgba(0,0,0,.4)}
.bubble.user{background:linear-gradient(135deg,#e86a2a,#c04010);color:#fff;border-radius:16px 4px 16px 16px;box-shadow:0 2px 12px rgba(232,106,42,.35)}
.typing{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.typing-dots{background:#1c1208;border-radius:4px 16px 16px 16px;padding:12px 16px;display:flex;gap:5px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:#e86a2a}
.dot:nth-child(1){animation:bounce 1.2s ease-in-out 0s infinite}
.dot:nth-child(2){animation:bounce 1.2s ease-in-out .2s infinite}
.dot:nth-child(3){animation:bounce 1.2s ease-in-out .4s infinite}
.quick-replies{padding:0 14px 10px;display:flex;gap:6px;flex-wrap:wrap}
.qr-btn{background:#1c1208;border:1px solid #2a1808;color:#e86a2a;border-radius:20px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;white-space:nowrap;transition:border-color .2s}
.qr-btn:hover{border-color:#e86a2a}
.input-area{padding:10px 14px 14px;border-top:1px solid #1c1208;background:#0e0804}
.input-box{display:flex;gap:8px;align-items:flex-end;background:#1c1208;border:1px solid #2a1808;border-radius:14px;padding:8px 8px 8px 14px}
.input-box textarea{flex:1;background:none;border:none;color:#f0e0d0;font-size:13px;resize:none;font-family:system-ui;line-height:1.5;max-height:80px;outline:none}
.send-btn{width:36px;height:36px;border-radius:10px;border:1px solid #2a1808;background:#1c1208;color:#333;cursor:not-allowed;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.send-btn.active{background:linear-gradient(135deg,#e86a2a,#c04010);border-color:#e86a2a;color:#fff;cursor:pointer}
.footer-text{color:#2a1808;font-size:10px;font-family:'JetBrains Mono',monospace;text-align:center;margin:7px 0 0}
.booked-badge{background:#0d1a0d;border:1px solid #1a3a1a;border-radius:8px;padding:4px 10px;margin-left:auto}
.booked-badge span{color:#55aa55;font-size:9px;font-family:'JetBrains Mono',monospace}
strong{font-weight:700}
</style>
</head>
<body>
<div class="chat-wrap">
  <div class="header">
    <div class="header-top">
      <div class="avatar">🥥</div>
      <div style="flex:1">
        <div class="header-name">The Coconut Grove</div>
        <div class="header-sub">
          <div class="online-dot"></div>
          <span>Maya · Built by Harshada Solutions · Powered by Claude</span>
        </div>
      </div>
      <div class="booked-badge" id="booked-badge" style="display:none"><span>Table booked ✓</span></div>
    </div>
    <div class="info-strip">
      <div class="info-chip"><span>🕗</span><span>8am–11:30pm</span></div>
      <div class="info-chip"><span>🎵</span><span>Live Fri & Sat</span></div>
      <div class="info-chip"><span>🌊</span><span>Beachfront</span></div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="quick-replies" id="quick-replies">
    <button class="qr-btn" onclick="sendQuick(this)">🍽️ See the menu</button>
    <button class="qr-btn" onclick="sendQuick(this)">📅 Book a table</button>
    <button class="qr-btn" onclick="sendQuick(this)">🎵 Live music nights?</button>
    <button class="qr-btn" onclick="sendQuick(this)">🦐 Today's specials</button>
    <button class="qr-btn" onclick="sendQuick(this)">🌅 Sunset dining</button>
    <button class="qr-btn" onclick="sendQuick(this)">🌱 Vegan options</button>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="input" rows="1" placeholder="Ask about the menu, book a table, or anything else..." oninput="onInput()" onkeydown="onKey(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
    </div>
    <p class="footer-text">Built by Harshada Solutions · Powered by Claude · The Coconut Grove</p>
  </div>
</div>

<script>
const SYSTEM = `You are Maya, a cheerful and warm AI assistant for "The Coconut Grove" — a beloved beachside restaurant & cafe in Goa, India. You're friendly, enthusiastic about the food, and make guests feel welcome.

ABOUT THE RESTAURANT:
- Location: Baga Beach, North Goa (beachfront seating available)
- Hours: 8:00 AM – 11:30 PM daily (kitchen closes 11:00 PM)
- Cuisine: Goan, Indian, Continental, Seafood specialties
- Vibe: Casual beachside dining, live music Fri & Sat nights (7pm–10pm)
- Parking: Available (free for diners)

MENU HIGHLIGHTS:
Breakfast (8am–12pm):
- Full Goan Breakfast (poie, chorizo, egg) – ₹320
- Açaí Bowl – ₹380
- Masala Omelette – ₹220
- Continental Breakfast – ₹350

Starters:
- Prawn Rawa Fry – ₹480
- Chicken Cafreal – ₹420
- Veg Spring Rolls – ₹280
- Fish Tikka – ₹520

Mains:
- Goan Fish Curry & Rice – ₹480
- Prawn Balchão – ₹560
- Chicken Xacuti – ₹440
- Mushroom Xec Xec (veg) – ₹360
- Pasta Arrabiata – ₹380

Desserts:
- Bebinca (traditional Goan) – ₹220
- Chocolate Lava Cake – ₹280
- Fresh Coconut Ice Cream – ₹180

Drinks:
- Fresh Coconut Water – ₹80
- King's Beer – ₹180
- Feni Cocktails – ₹280–380
- Fresh Juices – ₹120–160

RESERVATIONS:
- Tables for 1–8 people (larger groups need advance notice)
- Peak season (Nov–March): Book 2+ days in advance
- To reserve: collect name, phone, date, time, number of guests, and any dietary preferences
- Beach sunset slots (5pm–7pm) are most popular — book early!

FAQs:
- Yes, we have vegan & vegetarian options
- Yes, we allow outside cakes for birthdays (₹200 cake-cutting charge)
- No, we don't do home delivery currently (only dine-in)
- Live music: Friday & Saturday 7pm–10pm
- Dress code: Smart casual (no beachwear inside)

COMPLAINTS: Apologize warmly, take it seriously. If food quality/service issue, offer a complimentary dessert or discount on next visit. Escalate to manager for serious complaints. Ask for their contact.

TONE: Cheerful, warm, like a friendly local who loves food. Use food emojis occasionally 🦐🥥🌴. Keep replies short and friendly — 2-3 sentences unless listing menu items.`;

const GREETING = `Hey there! 🌴 Welcome to **The Coconut Grove** — Baga Beach's favourite spot for fresh seafood, Goan classics, and good vibes!\n\nI'm Maya, and I'm here to help you with reservations, our menu, or anything else. What can I do for you today? 😊`;

let history = [];
let loading = false;
let msgCount = 0;

function formatText(t) {
  return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
}

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  if (role === 'bot') {
    row.innerHTML = `<div class="bot-icon">🥥</div><div class="bubble bot">${formatText(text)}</div>`;
  } else {
    row.innerHTML = `<div class="bubble user">${formatText(text)}</div>`;
  }
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  msgCount++;
  if (msgCount > 2) document.getElementById('quick-replies').style.display = 'none';
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'typing'; el.id = 'typing';
  el.innerHTML = `<div class="bot-icon">🥥</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function onInput() {
  const btn = document.getElementById('send-btn');
  const val = document.getElementById('input').value.trim();
  btn.className = val && !loading ? 'send-btn active' : 'send-btn';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendQuick(btn) {
  sendMessage(btn.textContent.trim());
}

async function sendMessage(text) {
  const input = document.getElementById('input');
  const userText = text || input.value.trim();
  if (!userText || loading) return;
  input.value = '';
  onInput();

  if (/book|reserve|reservation|table/i.test(userText)) {
    document.getElementById('booked-badge').style.display = 'block';
  }

  addMessage('user', userText);
  history.push({ role: 'user', content: userText });
  loading = true;
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || "Oops! Something went wrong. Please try again 🙏";
    history.push({ role: 'assistant', content: reply });
    hideTyping();
    addMessage('bot', reply);
  } catch(e) {
    hideTyping();
    addMessage('bot', "Sorry, having a little tech hiccup! Please try again in a moment. 🙏");
  }
  loading = false;
  onInput();
}

// Init
addMessage('bot', GREETING);
history.push({ role: 'assistant', content: GREETING });
</script>
</body>
</html>
